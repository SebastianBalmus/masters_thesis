model_id: LiquidAI/LFM2-8B-A1B
dataset_id: allenai/sciq

seed: 42

routing_method: fixed_k_max

use_full: true
max_seq_length: 512
max_new_tokens: 8

per_device_train_batch_size: 32
per_device_eval_batch_size: 16
gradient_accumulation_steps: 1

learning_rate: 5.0e-5
lr_scheduler_type: linear
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 100

enable_task_metrics_during_training: false

report_to: wandb

wandb_config:
  project: routing_curriculum
  name: lfm2_sciq_fixed_k_max_full
  group: lfm2_sciq

output_dir: ckpt/lfm2_sciq_fixed_k_max_full
