model_id: LiquidAI/LFM2-8B-A1B
dataset_id: allenai/ai2_arc
dataset_easy_subset: ARC-Easy
dataset_challenge_subset: ARC-Challenge


seed: 42

routing_method: backloaded

use_lora: true
lora_config:
  r: 16
  lora_alpha: 32
  target_modules: all-linear
  lora_dropout: 0.05

max_seq_length: 512
max_new_tokens: 8

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 1

learning_rate: 1.0e-4
lr_scheduler_type: linear
warmup_ratio: 0.03
logging_steps: 10
eval_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100

enable_task_metrics_during_training: true

report_to: wandb
wandb_config:
  project: routing_curriculum
  name: lfm2_arc_backloaded_lora
  group: lfm2_arc

output_dir: ckpt/lfm2_arc_backloaded_lora
