model_id: allenai/OLMoE-1B-7B-0924-Instruct
dataset_id: allenai/ai2_arc
dataset_easy_subset: ARC-Easy
dataset_challenge_subset: ARC-Challenge


seed: 42

use_data_curriculum: false
use_model_curriculum: false

use_qlora: true
lora_config:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05

max_seq_length: 512

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 1

learning_rate: 2.0e-4
lr_scheduler_type: linear
warmup_ratio: 0.03
logging_steps: 10
eval_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100

report_to: wandb

wandb_config:
  project: curriculum_moe
  name: olmoe_arc_no_curriculum_qlora

output_dir: ckpt/olmoe_arc_no_curriculum_qlora