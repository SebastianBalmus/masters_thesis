model_id: allenai/OLMoE-1B-7B-0924-Instruct
dataset_id: allenai/ai2_arc
dataset_easy_subset: ARC-Easy
dataset_challenge_subset: ARC-Challenge


seed: 42

routing_method: warmup
routing_transition_ratio: 0.1

use_full: true
max_seq_length: 512
max_new_tokens: 8

per_device_train_batch_size: 32
per_device_eval_batch_size: 16
gradient_accumulation_steps: 1

learning_rate: 2.0e-5
lr_scheduler_type: linear
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 100

enable_task_metrics_during_training: false

report_to: wandb

wandb_config:
  project: routing_curriculum
  name: olmoe_arc_warmup_full
  group: olmoe_arc

output_dir: ckpt/olmoe_arc_warmup_full
