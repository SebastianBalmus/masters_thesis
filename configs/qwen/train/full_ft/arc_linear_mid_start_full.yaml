model_id: Qwen/Qwen1.5-MoE-A2.7B-Chat
dataset_id: allenai/ai2_arc
dataset_easy_subset: ARC-Easy
dataset_challenge_subset: ARC-Challenge


seed: 42

routing_method: linear_mid_start

use_full: true
full_config:
  r: 16
  full_alpha: 32
  target_modules: all-linear
  full_dropout: 0.05

max_seq_length: 512
max_new_tokens: 8

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 1

learning_rate: 1.0e-4
lr_scheduler_type: linear
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 100

enable_task_metrics_during_training: false

report_to: wandb
wandb_config:
  project: routing_curriculum
  name: qwen_arc_linear_mid_start_full
  group: qwen_arc

output_dir: ckpt/qwen_arc_linear_mid_start_full
